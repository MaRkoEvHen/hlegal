<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hlegal</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__menu">
                <div class="header__top">
                    <div class="header__lang">
                        <button class="header__lang-btn">УК</button>
                        <button class="header__lang-btn">РУ</button>
                        <button class="header__lang-btn header__lang-btn--active">EN</button>
                    </div>
                    <ul class="header__contacts">
                        <li class="header__contacts-item">
                            <address class="header__geo">Kyiv, Mechnikova str., 14/1</address>
                        </li>
                        <li class="header__contacts-item">
                            <a href="tel:0800211927" class="header__number">0800 211 927</a>
                        </li>
                        <li class="header__contacts-item">
                            <a href="#">
                                <svg class="header__messanger">
                                    <use href="./images/sprite.svg#facebook-header"></use>
                                </svg>
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="header__down">
                    <div class="header__logo">
                        <svg class="header__logo-svg">
                            <use href="./images/sprite.svg#logo"></use>
                        </svg>
                        <svg class="header__decoration">
                            <use href="./images/sprite.svg#decoration"></use>
                        </svg>
                        <h1 class="header__pages-title">service</h1>
                    </div>
                    <button class="header__hamburger">
                        <svg class="header__hamburger-svg" type="button" data-bs-toggle="offcanvas"
                            data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                            <use href="./images/sprite.svg#hamburger"></use>
                        </svg>
                    </button>
                    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight"
                        aria-labelledby="offcanvasRightLabel">
                        <div class="offcanvas-header">
                            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                                aria-label="Close"></button>
                        </div>
                        <div class="offcanvas-body">
                            <nav class="header__nav-mobile">
                                <a href="#" class="header__nav-link">about us</a>
                                <a href="#" class="header__nav-link">services</a>
                                <a href="#" class="header__nav-link">team</a>
                                <a href="#" class="header__nav-link header__nav-link--active">publications</a>
                                <a href="#" class="header__nav-link">contact</a>
                            </nav>
                        </div>
                    </div>
                    <nav class="header__nav">
                        <a href="#" class="header__nav-link">about us</a>
                        <a href="#" class="header__nav-link">services</a>
                        <a href="#" class="header__nav-link">team</a>
                        <a href="#" class="header__nav-link header__nav-link--active">publications</a>
                        <a href="#" class="header__nav-link">contact</a>
                    </nav>
                </div>
            </div>
            <div class="header__hero">
                <h1 class="header__title ">you legal solutions provider</h1>
                <svg class="header__arrow-svg">
                    <use href="./images/sprite.svg#arrow-down"></use>
                </svg>
            </div>
        </header>
        <main class="main">
            <div class="main__menu">
                <ul class="main__scroll">
                    <li class="main__scroll-item main__scroll-item--active">Consistent</li>
                    <li class="main__scroll-item">Customer oriented</li>
                    <li class="main__scroll-item">Innovative</li>
                    <li class="main__scroll-item">Business oriented</li>
                </ul>
            </div>
        </main>
        <footer class="footer">

        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>

</html>
